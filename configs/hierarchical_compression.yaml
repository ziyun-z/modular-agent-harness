experiment_name: "hierarchical_compression_naive_memory_single_agent"

model: "claude-sonnet-4-6"

orchestrator:
  max_steps: 50
  max_tokens_context: 100000
  memory_token_budget: 20000
  compression_target: 0.6

memory:
  type: "naive"
  params: {}

compression:
  type: "hierarchical"
  params:
    trigger_ratio: 0.8        # compress when turns exceed 80% of max_tokens_context
    keep_recent: 10           # keep the 10 most recent regular turns verbatim
    max_phases: 5             # max phase summaries before rolling up into mission
    summary_model: "claude-haiku-4-5-20251001"  # cheaper model for summarization
    max_phase_tokens: 300     # max tokens per phase summary paragraph
    max_mission_tokens: 500   # max tokens for the mission summary

communication:
  type: "single_agent"
  params: {}

evaluation:
  dataset: "swebench_lite"
  task_ids: null
  num_tasks: 50
  seed: 42

sandbox:
  docker_image: "swebench-sandbox:latest"
  timeout_per_task: 600   # seconds
