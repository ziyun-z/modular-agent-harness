experiment_name: "naive_memory_hierarchical_compression_single_agent"

model: "claude-sonnet-4-6"

orchestrator:
  max_steps: 50
  max_tokens_context: 100000
  memory_token_budget: 20000
  compression_target: 0.6

memory:
  type: "naive"
  params: {}

compression:
  type: "hierarchical"
  params:
    trigger_threshold: 0.8
    phase_interval: 10
    mission_update_interval: 20
    max_landmarks: 15

communication:
  type: "single_agent"
  params: {}

evaluation:
  dataset: "swebench_lite"
  task_ids: null
  num_tasks: 50
  seed: 42

sandbox:
  docker_image: "swebench-sandbox:latest"
  timeout_per_task: 600
