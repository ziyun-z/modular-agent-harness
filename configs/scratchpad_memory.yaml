experiment_name: "scratchpad_memory_no_compression_single_agent"

model: "claude-sonnet-4-6"

orchestrator:
  max_steps: 50
  max_tokens_context: 100000
  memory_token_budget: 4000    # scratchpad is compact; 4K is generous
  compression_target: 0.6

memory:
  type: "scratchpad"
  params: {}

compression:
  type: "none"
  params: {}

communication:
  type: "single_agent"
  params: {}

evaluation:
  dataset: "swebench_lite"
  task_ids: null
  num_tasks: 50
  seed: 42

sandbox:
  docker_image: "swebench-sandbox:latest"
  timeout_per_task: 600
